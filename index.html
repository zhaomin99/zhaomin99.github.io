<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>水夕导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
color:#182338;
background:
radial-gradient(circle at 15% 20%,rgba(130,175,255,.35),transparent 35%),
radial-gradient(circle at 85% 25%,rgba(255,180,220,.32),transparent 38%),
linear-gradient(180deg,#f7faff,#edf3fa);
}
body:before,body:after{content:"";position:fixed;width:280px;height:280px;border-radius:50%;filter:blur(80px);opacity:.4;z-index:-1}
body:before{background:#8db8ff;left:-100px;top:180px}
body:after{background:#ffb6dd;right:-100px;bottom:100px}
.app{
height:100vh;
max-width:680px;
margin:auto;
padding:calc(22px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
display:flex;
flex-direction:column;
}
.brand{text-align:center;margin-bottom:18px}
.brand h1{font-size:32px;font-weight:850;letter-spacing:4px;background:linear-gradient(135deg,#17233b,#526b99);-webkit-background-clip:text;color:transparent}
.brand p{margin-top:5px;font-size:14px;color:#778397}
.menu{display:flex;flex-direction:column;gap:12px;flex:1;justify-content:center}
.card{
height:104px;
display:flex;
align-items:center;
padding:14px 16px;
border-radius:25px;
text-decoration:none;
color:#182338;
background:rgba(255,255,255,.65);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.75);
box-shadow:0 10px 30px rgba(40,65,100,.12);
}
.card:active{transform:scale(.97)}
.icon{width:56px;height:56px;border-radius:19px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#eef3ff;font-size:28px;flex:none;margin-right:15px}
.icon img{width:100%;height:100%;object-fit:cover}
.info{flex:1}
.title{font-size:18px;font-weight:750}
.desc{font-size:14px;color:#718097;margin-top:5px}
.code{font-size:13px;color:#718097;margin-top:5px;display:flex;align-items:center;gap:5px}
.code b{background:#fde8e5;color:#c0392b;padding:2px 8px;border-radius:8px}
.copy-btn{border:0;background:#edf2f8;border-radius:18px;padding:3px 10px}
.arrow{font-size:28px;color:#c5cfdf}
.toast{position:fixed;left:50%;bottom:35px;transform:translate(-50%,50px);opacity:0;background:#202938;color:#fff;padding:10px 25px;border-radius:30px;transition:.3s}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:768px){
.brand h1{font-size:42px}
.card{height:112px;padding:18px 22px}
.icon{width:62px;height:62px}
.title{font-size:20px}
.desc{font-size:15px}
}
</style>
</head>
<body>
<div class="app">
<div class="brand"><h1>水夕导航</h1><p>全网优质资源 · 一键直达</p></div>
<div class="menu">

<a class="card" href="https://sx.fc688.cn" target="_blank"><div class="icon"><img src="sxpgw.png"></div><div class="info"><div class="title">水夕瓶盖网</div><div class="desc">轻松扫码 · 每日羊毛</div></div><div class="arrow">›</div></a>

<a class="card" href="https://qun.qq.com/universal-share/share" target="_blank"><div class="icon">💬</div><div class="info"><div class="title">加入QQ群</div><div class="desc">神卡通知 · 瓶盖报水</div></div><div class="arrow">›</div></a>

<a class="card" href="https://wxmpurl.cn/Eu8LOaZ05Cc" target="_blank"><div class="icon"><img src="xc.png"></div><div class="info"><div class="title">外卖返利-新人免单</div><div class="desc">点外卖先领券，每单都省钱</div></div><div class="arrow">›</div></a>

<a class="card" href="https://kzurl06.cn/tGbuW3" target="_blank"><div class="icon"><img src="gs.png"></div><div class="info"><div class="title">购物返利-高省</div><div class="desc">全网比价 · 最高返利</div><div class="code">邀请码:<b id="code">7X46I0</b><button class="copy-btn" onclick="copyCode(event)">复制</button></div></div><div class="arrow">›</div></a>

</div></div>
<div class="toast" id="toast">已复制邀请码！</div>
<script>
function copyCode(e){
e.preventDefault();e.stopPropagation();
let b=e.currentTarget,t=document.getElementById("toast");
navigator.clipboard.writeText(document.getElementById("code").innerText).then(()=>{
b.innerHTML="✅已复制";b.classList.add("ok");t.classList.add("show");
setTimeout(()=>{b.innerHTML="复制";b.classList.remove("ok");t.classList.remove("show")},1600);
});
}
</script>
</body>
</html>
