.copy-btn{border:0;background:#eef2f7;border-radius:20px;padding:3px 12px}
.toast{position:fixed;left:50%;bottom:35px;opacity:0;transform:translate(-50%,60px);background:#192130;color:#fff;padding:10px 24px;border-radius:30px;transition:.3s}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:768px){
.app{padding-top:70px}
.brand h1{font-size:40px}
.card{padding:20px 24px;border-radius:26px}
