/* 提示 */

.toast{

translate(-50%,60px);

rgba(20,28,40,.92);

padding:12px 28px;


border-radius:30px;

}



.toast.show{

translate(-50%,0);

}



/* 动画 */


@keyframes up{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:none;

}

}


@keyframes fade{

from{

opacity:0;

to{

<script>


function copyCode(e){


e.preventDefault();

e.stopPropagation();



let code =
document.getElementById("code").innerText;



let btn =
e.currentTarget;



let toast =
document.getElementById("toast");



function done(){


btn.classList.add("ok");

btn.innerHTML="✅已复制";


toast.classList.add("show");



setTimeout(()=>{


btn.classList.remove("ok");

btn.innerHTML="一键复制";


toast.classList.remove("show");


},1600);


}



if(navigator.clipboard){


navigator.clipboard.writeText(code)
.then(done)
.catch(fallback);



}else{


fallback();


}



function fallback(){


let t=document.createElement("textarea");


t.value=code;


document.body.appendChild(t);


t.select();


document.execCommand("copy");


t.remove();


done();


}


}


</script>
