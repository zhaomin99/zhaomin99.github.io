<style>
*{margin:0;padding:0;box-sizing:border-box}
body{

min-height:100vh;
background:linear-gradient(180deg,#f7f9fc,#eef2f8);
color:#182338;
}
.app{
width:min(100%,520px);
margin:auto;
padding:32px 16px calc(40px + env(safe-area-inset-bottom));
}
.brand{
text-align:center;
margin-bottom:28px;
animation:up .5s ease;
}
.brand h1{
font-size:32px;
font-weight:750;
letter-spacing:2px;
}
.brand p{
margin-top:8px;
font-size:14px;
color:#7c8798;
}
.menu{
display:flex;
flex-direction:column;
gap:14px;
}
.card{
display:flex;
align-items:center;
background:rgba(255,255,255,.86);
backdrop-filter:blur(15px);
border-radius:22px;
padding:16px;
text-decoration:none;
color:#182338;
box-shadow:0 8px 25px rgba(30,55,90,.08);
transition:.25s;
animation:up .5s ease both;
}
.card:hover{
transform:translateY(-3px);
box-shadow:0 14px 30px rgba(30,55,90,.13);
}
.card:active{transform:scale(.97)}
.icon{
width:52px;
height:52px;
border-radius:18px;
overflow:hidden;
flex:none;
margin-right:15px;
background:#eef3ff;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}
.icon img{
width:100%;
height:100%;
object-fit:cover;
}
.info{flex:1;min-width:0}
.title{
font-size:17px;
font-weight:650;
}
.desc,.code{
font-size:13px;
color:#718097;
margin-top:5px;
}
.arrow{
font-size:24px;
color:#c4cedc;
}
.code{
display:flex;
align-items:center;
gap:5px;
}
.code b{
background:#fde8e5;
color:#c0392b;
padding:2px 8px;
border-radius:9px;
}
.copy-btn{
border:0;
background:#eef2f7;
color:#40516b;
border-radius:20px;
padding:3px 10px;
font-size:13px;
}
.copy-btn.ok{
background:#dff5e8;
color:#16844c;
}
.toast{
position:fixed;
left:50%;
bottom:35px;
transform:translate(-50%,60px);
opacity:0;
background:rgba(25,33,48,.94);
color:#fff;
padding:10px 24px;
border-radius:30px;
font-size:14px;
transition:.35s;
}
.toast.show{
opacity:1;
transform:translate(-50%,0);
}
@keyframes up{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:none}
}
@media(min-width:768px){
.app{padding-top:70px}
.brand h1{font-size:40px}
.brand p{font-size:16px}
.card{padding:20px 24px;border-radius:26px}
.icon{width:64px;height:64px;border-radius:22px;margin-right:20px}
.title{font-size:20px}
.desc,.code{font-size:15px}
.arrow{font-size:30px}
}
</style>
</head>

<div class="toast" id="toast">已复制邀请码！</div>

<script>
function copyCode(e){
e.preventDefault();
e.stopPropagation();
let code=document.getElementById("code").innerText;
let btn=e.currentTarget;
let toast=document.getElementById("toast");
let done=()=>{
btn.classList.add("ok");
btn.innerHTML="✅已复制";
toast.classList.add("show");
setTimeout(()=>{
btn.classList.remove("ok");
btn.innerHTML="📋复制";
toast.classList.remove("show");
},1600);
};
if(navigator.clipboard){
navigator.clipboard.writeText(code).then(done).catch(()=>fallback());
}else{fallback();}
function fallback(){
let t=document.createElement("textarea");
t.value=code;
document.body.appendChild(t);
t.select();
document.execCommand("copy");
t.remove();
done();
}
}
</script>
